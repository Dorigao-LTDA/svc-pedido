spring:
  application:
    name: pedido
  threads:
    virtual:
      enabled: true

# Server
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  netty:
    connection-timeout: 5s

# OpenTelemetry
otel:
  service:
    name: ${OTEL_SERVICE_NAME:pedido}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://alloy.observability.svc.cluster.local:4318}
      protocol: http/protobuf
  resource:
    attributes:
      service.namespace: ${OTEL_RESOURCE_ATTRIBUTES_SERVICE_NAMESPACE:app}
      service.name: ${OTEL_SERVICE_NAME:pedido}
      deployment.environment: ${DEPLOY_ENV:development}
  traces:
    sampler: ${OTEL_TRACES_SAMPLER:parentbased_always_on}
    exporter: otlp
  metrics:
    exporter: otlp
  logs:
    exporter: otlp

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,readiness,liveness
      base-path: /
      path-mapping:
        health: health
        info: info
        prometheus: prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  metrics:
    export:
      otlp:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://alloy.observability.svc.cluster.local:4318}/v1/metrics

# Logging
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.dorigao: ${APP_LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] [%X{spanId:-}] %-5level %logger{36} - %msg%n"
