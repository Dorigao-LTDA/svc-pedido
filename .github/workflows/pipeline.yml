name: ci-cd-pedido

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_perf_tests:
        description: 'Executar testes de performance?'
        type: boolean
        default: true
      run_stress_spike_tests:
        description: 'Executar testes de stress e spike?'
        type: boolean
        default: false
      run_chaos_tests:
        description: 'Executar testes de resiliência?'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: write

env:
  SERVICE_NAME: pedido
  IMAGE_NAME: ${{ vars.ACR_LOGIN_SERVER || 'acrctframework.azurecr.io' }}/pedido

jobs:
  # =============================================
  # Stage 1: Build + Unit Tests + SAST
  # =============================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache OWASP Dependency Check database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Build
        run: mvn clean compile -B -q

      - name: Unit Tests
        run: mvn test -B

      - name: Coverage Report
        run: mvn jacoco:report -B

      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(awk -F'[<>]' '/<counter type="LINE"/{for(i=1;i<=NF;i++) if($i~/COVERED/) print $(i+1)}' target/site/jacoco/jacoco.xml | head -1)
          MISSED=$(awk -F'[<>]' '/<counter type="LINE"/{for(i=1;i<=NF;i++) if($i~/MISSED/) print $(i+1)}' target/site/jacoco/jacoco.xml | head -1)
          TOTAL=$((COVERED + MISSED))
          if [ "$TOTAL" -gt 0 ]; then
            RATIO=$(echo "scale=2; $COVERED / $TOTAL * 100" | bc)
            echo "Line coverage: ${RATIO}%"
          fi

      # - name: SAST — OWASP Dependency Check
      #   env:
      #     NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      #   run: |
      #     mvn org.owasp:dependency-check-maven:check -B || true

  # =============================================
  # Stage 2: Build Docker Image + Push ACR
  # =============================================
  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ vars.ACR_NAME || 'acrctframework' }}

      - name: Build and Push Docker image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t ${{ env.IMAGE_NAME }}:$SHORT_SHA \
                       -t ${{ env.IMAGE_NAME }}:latest \
                       --build-arg BUILDKIT_INLINE_CACHE=1 .
          docker push ${{ env.IMAGE_NAME }}:$SHORT_SHA
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Image Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'  # Não quebrar por enquanto

  # =============================================
  # Stage 3: Trigger ArgoCD Sync
  # =============================================
  deploy:
    name: Deploy to AKS via ArgoCD
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Wait for ArgoCD
        run: |
          echo "Waiting for ArgoCD server to be ready..."
          for i in $(seq 1 30); do
            if kubectl get deployment argocd-server -n argocd &>/dev/null && \
               kubectl rollout status deployment/argocd-server -n argocd --timeout=10s &>/dev/null; then
              echo "ArgoCD server is ready"
              exit 0
            fi
            echo "Attempt $i/30: ArgoCD not ready yet..."
            sleep 10
          done
          echo "ERROR: ArgoCD server did not become ready after 5 minutes" >&2
          exit 1

      - name: Wait for Application
        run: |
          echo "Waiting for ArgoCD Application '${{ env.SERVICE_NAME }}' to exist..."
          for i in $(seq 1 30); do
            if kubectl get application ${{ env.SERVICE_NAME }} -n argocd &>/dev/null; then
              echo "Application '${{ env.SERVICE_NAME }}' exists"
              exit 0
            fi
            echo "Attempt $i/30: Application not found yet..."
            sleep 10
          done
          echo "ERROR: Application '${{ env.SERVICE_NAME }}' not found after 5 minutes" >&2
          echo "Ensure the root-app has synced and created the Application resource" >&2
          exit 1

      - name: Trigger ArgoCD Sync
        run: |
          kubectl patch application ${{ env.SERVICE_NAME }} -n argocd \
            -p '{"operation":{"sync":{"revision":"${{ github.sha }}"}}}' \
            --type=merge

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n app --timeout=300s

  # =============================================
  # Stage 4: Smoke Test
  # =============================================
  smoke-test:
    name: Smoke Test (k6)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Port-forward to AKS
        run: |
          kubectl port-forward -n app svc/${{ env.SERVICE_NAME }} 8080:8080 &
          PF_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health; then
              echo "Tunnel ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Tunnel failed to become ready after 30s" >&2
          exit 1

      - name: Generate k6 env from NFR
        run: |
          python3 /tmp/ct-common/scripts/nfr-to-env.py --nfr nfr.yaml --output nfr-env.sh --service ${{ env.SERVICE_NAME }}
          sed 's/^export //' nfr-env.sh > /tmp/k6-env.txt

      - name: Run k6 Smoke
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/smoke.js --out json=smoke-results.json

      - name: Upload Smoke Results
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: smoke-results.json

  # =============================================
  # Stage 5: Performance Test (Baseline)
  # =============================================
  performance-test:
    name: Performance Test (k6)
    needs: [deploy, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Port-forward to AKS
        run: |
          kubectl port-forward -n app svc/${{ env.SERVICE_NAME }} 8080:8080 &
          PF_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health; then
              echo "Tunnel ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Tunnel failed to become ready after 30s" >&2
          exit 1

      - name: Generate k6 env from NFR
        run: |
          python3 /tmp/ct-common/scripts/nfr-to-env.py --nfr nfr.yaml --output nfr-env.sh --service ${{ env.SERVICE_NAME }}
          sed 's/^export //' nfr-env.sh > /tmp/k6-env.txt

      - name: Run k6 Baseline
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/baseline.js --out json=baseline-results.json --tag test_type=baseline

      - name: Run k6 Stress
        if: ${{ inputs.run_stress_spike_tests == true }}
        continue-on-error: true
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/stress.js --out json=stress-results.json --tag test_type=stress

      - name: Run k6 Spike
        if: ${{ inputs.run_stress_spike_tests == true }}
        continue-on-error: true
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/spike.js --out json=spike-results.json --tag test_type=spike

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: |
            baseline-results.json
            stress-results.json
            spike-results.json

  # =============================================
  # Stage 6: Resilience Test
  # =============================================
  resilience-test:
    name: Resilience Test (Chaos)
    needs: [deploy, smoke-test, performance-test]
    runs-on: ubuntu-latest
    if: ${{ inputs.run_chaos_tests == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Generate k6 env from NFR
        run: |
          python3 /tmp/ct-common/scripts/nfr-to-env.py --nfr nfr.yaml --output nfr-env.sh --service ${{ env.SERVICE_NAME }}
          sed 's/^export //' nfr-env.sh > /tmp/k6-env.txt

      - name: Apply Pod Kill and Measure Recovery
        run: |
          CHAOS_START=$(date +%s%N)
          kubectl apply -f chaos/pod-kill.yaml
          # Wait for chaos duration
          sleep 60
          # Wait for recovery: poll until pod is 1/1 Running
          while true; do
            POD_STATUS=$(kubectl get pods -n app -l app=${{ env.SERVICE_NAME }} -o jsonpath='{.items[0].status.phase}' 2>/dev/null)
            if [ "$POD_STATUS" = "Running" ]; then
              READY=$(kubectl get pods -n app -l app=${{ env.SERVICE_NAME }} -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null)
              if [ "$READY" = "true" ]; then break; fi
            fi
            NOW=$(date +%s%N)
            ELAPSED=$(( (NOW - CHAOS_START) / 1000000000 ))
            if [ $ELAPSED -gt 120 ]; then echo "Recovery timeout"; break; fi
            sleep 2
          done
          CHAOS_END=$(date +%s%N)
          RECOVERY_TIME=$(( (CHAOS_END - CHAOS_START) / 1000000000 - 60 ))
          echo "Pod kill recovery time: ${RECOVERY_TIME}s"
          echo "{\"pod-kill\": {\"recovery_time_seconds\": $RECOVERY_TIME}}" > chaos-recovery.json

      - name: Apply Network Delay Chaos
        run: |
          kubectl apply -f chaos/network-delay.yaml

      - name: Port-forward to AKS
        run: |
          kubectl port-forward -n app svc/${{ env.SERVICE_NAME }} 8080:8080 &
          PF_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health; then
              echo "Tunnel ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Tunnel failed to become ready after 30s" >&2
          exit 1

      - name: Monitor with k6 during chaos
        continue-on-error: true
        env:
          BASE_URL: http://localhost:8080
        run: |
          docker run --rm --network host \
            --user "$(id -u):$(id -g)" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BASE_URL \
            --env-file /tmp/k6-env.txt \
            grafana/k6 run perf/smoke.js --out json=chaos-results.json

      - name: Cleanup Chaos
        run: |
          kubectl delete -f chaos/ --ignore-not-found
          pkill -f "port-forward.*svc/${{ env.SERVICE_NAME }}" 2>/dev/null || true

      - name: Upload Chaos Results
        uses: actions/upload-artifact@v4
        with:
          name: chaos-results
          path: |
            chaos-results.json
            chaos-recovery.json

  # =============================================
  # Stage 7: Gate Evaluation
  # =============================================
  gate-evaluation:
    name: Gate Evaluation
    needs: [smoke-test, performance-test, resilience-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Clone shared toolkit
        run: git clone --depth 1 https://github.com/Dorigao-LTDA/ct-common.git /tmp/ct-common

      - name: Download all results
        uses: actions/download-artifact@v4

      - name: Validate against NFR
        run: |
          python3 /tmp/ct-common/scripts/evaluate-gates.py \
            --artifacts . \
            --nfr nfr.yaml \
            --service ${{ env.SERVICE_NAME }}

      - name: Upload Gate Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-summary
          path: gate-summary.json
