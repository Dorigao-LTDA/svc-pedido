name: ci-cd-pedido
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_stress_spike_tests:
        type: boolean
        default: false
      run_chaos_tests:
        type: boolean
        default: false
permissions:
  id-token: write
  contents: read
  packages: write
jobs:
  ci-cd:
    uses: Dorigao-LTDA/ct-common/.github/workflows/pipeline-reusable.yml@main
    with:
      service_name: pedido
      run_stress_spike_tests: ${{ inputs.run_stress_spike_tests || false }}
      run_chaos_tests: ${{ inputs.run_chaos_tests || false }}
    secrets: inherit
